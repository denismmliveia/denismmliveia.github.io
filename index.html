<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#06000f">
<title>Rave Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:     #06000f;
    --purple: #b300ff;
    --green:  #39ff14;
    --white:  #ffffff;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: system-ui, sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }

  /* ── CARD ── */
  .card {
    width: 100%; max-width: 420px;
    background: var(--bg);
    position: relative; overflow: hidden;
    border-radius: 12px;
    border: 1px solid rgba(179,0,255,0.2);
    box-shadow: 0 0 40px rgba(179,0,255,0.1);
    padding: 24px 28px 32px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ── BACKGROUND ── */
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(179,0,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(179,0,255,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
  }
  .bg-glow {
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(ellipse, rgba(179,0,255,0.15) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  .card > *:not(.bg-grid):not(.bg-glow) { position: relative; z-index: 1; }

  /* ── TOP BAR ── */
  .top-bar {
    width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .top-label { font-size: 9px; letter-spacing: 4px; color: var(--purple); text-transform: uppercase; }
  .top-status { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--green); }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── PHOTO ── */
  .photo-wrap {
    width: 104px; height: 104px; border-radius: 50%;
    border: 2px solid var(--purple);
    box-shadow: 0 0 20px rgba(179,0,255,0.5), 0 0 48px rgba(179,0,255,0.2);
    overflow: hidden; margin-bottom: 16px;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }

  /* ── NAME ── */
  .name {
    font-size: 24px; font-weight: 700; letter-spacing: 5px;
    text-transform: uppercase; color: var(--white);
    text-shadow: 0 0 12px var(--purple), 0 0 28px rgba(179,0,255,0.4);
    margin-bottom: 5px; text-align: center;
  }
  .tagline {
    font-size: 9px; letter-spacing: 3px; color: var(--purple);
    text-transform: uppercase; margin-bottom: 28px; text-align: center; opacity: 0.8;
  }

  /* ── FIELDS ── */
  .fields { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .field {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 14px;
    border: 1px solid rgba(179,0,255,0.2); border-radius: 3px;
    background: rgba(179,0,255,0.05); position: relative;
  }
  .field::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    border-radius: 3px 0 0 3px;
    background: var(--purple); box-shadow: 0 0 8px var(--purple);
  }
  .field-label { font-size: 9px; letter-spacing: 2px; color: rgba(179,0,255,0.6); text-transform: uppercase; }
  .field-value {
    font-size: 11px; font-weight: 700; color: var(--green);
    letter-spacing: 1px; text-transform: uppercase;
    text-shadow: 0 0 8px rgba(57,255,20,0.4);
  }

  /* ── DIVIDER ── */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(179,0,255,0.5), transparent);
    margin-bottom: 24px;
  }

  /* ── QR ── */
  .qr-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .qr-label { font-size: 8px; letter-spacing: 3px; color: rgba(179,0,255,0.5); text-transform: uppercase; }
  #qr-container {
    padding: 8px;
    border: 1px solid rgba(179,0,255,0.3);
    background: rgba(179,0,255,0.04);
    box-shadow: 0 0 16px rgba(179,0,255,0.15);
  }
  #qr-container canvas, #qr-container img { display: block; }
  .qr-placeholder {
    width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; letter-spacing: 1px;
    color: rgba(179,0,255,0.4); text-align: center; line-height: 1.4;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="top-bar">
    <span class="top-label">Rave Card</span>
    <span class="top-status">
      <span class="status-dot"></span>
      <span>Online</span>
    </span>
  </div>

  <div class="photo-wrap">
    <img id="photo" src="" alt="foto">
  </div>

  <div id="name" class="name"></div>
  <div id="tagline" class="tagline"></div>

  <div class="fields">
    <div class="field">
      <span class="field-label">Género fav</span>
      <span id="genero" class="field-value"></span>
    </div>
    <div class="field">
      <span class="field-label">Orientación</span>
      <span id="orientacion" class="field-value"></span>
    </div>
    <div class="field">
      <span class="field-label">Estado civil</span>
      <span id="estado" class="field-value"></span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="qr-section">
    <div class="qr-label">Escanea para guardar</div>
    <div id="qr-container">
      <div class="qr-placeholder">URL<br>pendiente</div>
    </div>
  </div>
</div>

<script>
var CARD = {
  name:        "DENIS",
  tagline:     "Techno Enthusiast · 2026",
  genero_fav:  "Hard Techno",
  orientacion: "TODO",
  estado:      "TODO",
  card_url:    "https://TODO.github.io/rave-card/"
};

document.getElementById('name').textContent        = CARD.name;
document.getElementById('tagline').textContent     = CARD.tagline;
document.getElementById('genero').textContent      = CARD.genero_fav;
document.getElementById('orientacion').textContent = CARD.orientacion;
document.getElementById('estado').textContent      = CARD.estado;
</script>
</body>
</html>
